name: Build and Push Docker image to ECR

on:
    push:
        branches:
            - "**"

env:
    AWS_REGION: us-east-1
    AWS_ROLE_TO_ASSUME: arn:aws:iam::892217934672:role/GitHubAction-ECR-Push-Role
    ECR_REGISTRY: 892217934672.dkr.ecr.ap-southeast-1.amazonaws.com
    ECR_REPOSITORY: ismethanhtung/fintrace-py

permissions:
    id-token: write
    contents: read

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Set image tags
              id: meta
              run: |
                  echo "IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_ENV"
                  echo "IMAGE_TAG_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"

                  if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
                    echo "PUSH_LATEST=true" >> "$GITHUB_ENV"
                  else
                    echo "PUSH_LATEST=false" >> "$GITHUB_ENV"
                  fi

            - name: Build and push image (with cache)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG_SHA }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Tag latest from SHA image (main/master only)
              if: env.PUSH_LATEST == 'true'
              run: |
                  docker buildx imagetools create \
                    -t "$IMAGE_URI:latest" \
                    "$IMAGE_URI:$IMAGE_TAG_SHA"
